<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Chart</title>
</head>
<body>
    <header class="header">
        <h1>RainTrack</h1>
        <p>A weather tracking platform</p>
    </header>

    <main class="container">
        <h2>RainTrack</h2>
        <p>Rainfall Chart</p>

        <div class="form">
            <div class="box">
                <label for="start_date">Start date</label> <br>
                <input type="date" id="end_date" name="datePicker">
            </div>
            
            <div class="box">
                <label for="end_date">End date</label> <br>
                <input type="date" id="date" name="datePicker">
            </div>
           
            <div class="chart-placeholder">
                <p>Bar chart placeholder</p>
            </div>

            <div class="box">  
                <a href="index.html">
                    <button>Back</button>
                </a>  
                
            </div>
            
            
        </div>    
    </main>

    <footer>
        <p>Created by Obert &copy;</p>
    </footer>
</body>
</html>
