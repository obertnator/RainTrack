<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="container-fluid bg-dark">
      <div class="container-fluid text-center bg-dark ">
        <h1 class="text-light">RainTrack</h1>
      </div>
      <div class="container-fluid text-center mt-0">
        <p class="text-secondary pb-1">A weather tracking platform</p>
      </div>
    </nav>

    <div class="container-md mt-5 shadow p-3 mb-5 bg-body rounded pe-2">
      <h2 class="mb-2 fw-bold fs-1">RainTrack</h2>
      <p class="text-secondary">Record daily rainfall</p>
      <form id="form ">
        <label for="date" class="fw-bold">Date</label>
        <input
          type="date"
          name="rainfallDate"
          placeholder="yyyy / mm / dd"
          class="form-control w-75 mb-2 font-monospace"
        />

        <label class="fw-bold" for="rainfall">Rainfall (mm)</label>
        <input
          type="number"
          name="rainfall"
          id="password"
          class="form-control mb-2 w-75"
          placeholder="e.g. 12.5"
        />

        <button class="btn btn-dark mt-2 mb-2">Save (no action)</button>
        <a href="chart.html"><button class="btn btn-dark mt-2 mb-2" type="button">View chart</button></a>
      </form>
    </div>
  </body>
</html>
